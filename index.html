<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upcoming at BOLLI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23201b;          /* warm near-black */
    --paper:#f6f1e7;        /* warm cream */
    --card:#fffdf8;
    --line:#e3dac8;
    --brand:#005587;        /* BOLLI blue */
    --brand-deep:#003f63;
    --brand-soft:#e4eef4;
    --accent:#c2410c;       /* burnt orange, editorial warmth */
    --accent-soft:#f6e6d6;
    --muted:#8a8270;
    --gold:#b8860b;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Newsreader",Georgia,serif;font-size:17px;line-height:1.55;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:940px;margin:0 auto;padding:0 22px 90px}

  /* ---------- Masthead ---------- */
  header.masthead{padding:30px 0 0}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:20px;
    padding-bottom:18px;border-bottom:1px solid var(--line);}
  .toprow img{height:46px;width:auto;display:block}
  .toprow .est{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.7}
  .hero{padding:40px 0 30px;border-bottom:3px double var(--brand);position:relative}
  .kicker{font-family:"DM Mono",monospace;font-size:12px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--accent);font-weight:500;margin:0 0 14px;
    display:flex;align-items:center;gap:12px}
  .kicker::after{content:"";flex:1;height:1px;background:var(--line)}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(44px,8vw,82px);
    line-height:.95;letter-spacing:-.02em;margin:0 0 18px;color:var(--brand-deep)}
  h1 em{font-style:italic;font-weight:400;color:var(--accent)}
  .lede{font-size:clamp(18px,2.4vw,22px);line-height:1.45;max-width:54ch;color:#4a463c;
    margin:0;font-style:italic;font-family:"Newsreader",serif}
  .site-link{display:inline-block;margin-top:20px;font-family:"DM Mono",monospace;
    font-size:13px;letter-spacing:.05em;color:var(--brand);text-decoration:none;
    border-bottom:1.5px solid var(--accent);padding-bottom:2px;transition:.13s}
  .site-link:hover{color:var(--accent)}

  /* ---------- Controls ---------- */
  .controls{position:sticky;top:0;z-index:30;background:var(--paper);
    padding:16px 0 14px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .searchrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  #q{flex:1 1 240px;min-width:180px;padding:12px 16px;border:1.5px solid var(--line);
    border-radius:2px;font-size:16px;font-family:"Newsreader",serif;background:var(--card);
    color:var(--ink)}
  #q::placeholder{color:var(--muted);font-style:italic}
  #q:focus{outline:none;border-color:var(--brand)}
  .count{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);
    letter-spacing:.05em;white-space:nowrap}
  .filterbank{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;align-items:center}
  .grp{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .grp-label{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);margin-right:1px}
  button.chip{font-family:"DM Mono",monospace;font-size:12px;letter-spacing:.03em;
    padding:6px 13px;border-radius:2px;border:1px solid var(--line);
    background:transparent;color:#5c574a;cursor:pointer;transition:.13s}
  button.chip:hover{border-color:var(--brand);color:var(--brand)}
  button.chip[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}
  .divider{width:1px;align-self:stretch;background:var(--line);margin:2px 5px}

  /* ---------- Month header ---------- */
  .monthhead{font-family:"Fraunces",serif;font-weight:600;font-size:15px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--brand);
    padding:34px 0 6px;display:flex;align-items:baseline;gap:14px}
  .monthhead .yr{font-family:"DM Mono",monospace;font-weight:400;font-size:12px;color:var(--muted);letter-spacing:.1em}
  .monthhead::after{content:"";flex:1;height:2px;background:var(--brand);opacity:.25;align-self:center}

  /* ---------- Event card ---------- */
  .event{display:grid;grid-template-columns:84px 1fr;gap:22px;
    padding:22px 4px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:padding-left .15s, background .15s}
  .event:hover{background:var(--card);padding-left:10px}
  .event:last-child{border-bottom:none}
  .datecol{text-align:center;border-right:1px solid var(--line);padding-right:4px}
  .ddow{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .dnum{font-family:"Fraunces",serif;font-weight:500;font-size:40px;line-height:.9;color:var(--brand-deep)}
  .etitle{font-family:"Fraunces",serif;font-weight:600;font-size:21px;line-height:1.2;
    margin:0 0 8px;color:var(--ink);letter-spacing:-.01em}
  .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .ttime{font-family:"DM Mono",monospace;font-size:12px;color:#5c574a;letter-spacing:.02em}
  .dot{color:var(--line)}
  .tag{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.04em;
    padding:3px 9px;border-radius:2px;background:var(--brand-soft);color:var(--brand-deep)}
  .tag.mod{background:#ece5d6;color:#6b6450}
  .tag.acc-public{background:#e2efe1;color:#2f6b3c}
  .tag.acc-free{background:var(--accent-soft);color:var(--accent)}
  .detail{display:none;grid-column:2 / -1;padding:6px 0 2px;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .event.open .detail{display:block}
  .detail p{margin:10px 0 12px;font-size:17px;color:#3c382f;max-width:64ch}
  .note{font-family:"Newsreader",serif;font-style:italic;font-size:14px;
    background:var(--accent-soft);border-left:3px solid var(--accent);
    padding:9px 14px;border-radius:0 2px 2px 0;color:#8a3a0c;margin:10px 0}
  .reg{display:inline-block;margin-top:6px;font-family:"DM Mono",monospace;
    font-size:13px;letter-spacing:.04em;color:#fff;background:var(--accent);
    padding:10px 20px;border-radius:2px;text-decoration:none;transition:.13s}
  .reg:hover{background:#9a330a}
  .empty{text-align:center;color:var(--muted);padding:70px 20px;font-size:19px;font-style:italic}

  footer{margin-top:46px;padding-top:20px;border-top:3px double var(--brand);
    font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);
    line-height:1.7;letter-spacing:.02em;display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:14px;align-items:flex-end}
  footer img{height:54px;width:auto;opacity:.85}

  @media (max-width:560px){
    .toprow img{height:38px}
    .event{grid-template-columns:60px 1fr;gap:15px}
    .dnum{font-size:30px}.detail{grid-column:1 / -1}
    .toprow .est{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parseD(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
const TYPES=[...new Set(EVENTS.map(e=>e.type))].sort();
const MODS=[...new Set(EVENTS.map(e=>e.modality))].sort();
const ACCESS=[...new Set(EVENTS.map(e=>e.access))].sort();
let state={q:"",type:new Set(),mod:new Set(),acc:new Set()};
function chip(label,group,val){
  const b=document.createElement("button");
  b.className="chip";b.textContent=label;b.setAttribute("aria-pressed","false");
  b.onclick=()=>{const set=state[group];set.has(val)?set.delete(val):set.add(val);
    b.setAttribute("aria-pressed",set.has(val));render();};
  return b;
}
function buildFilters(){
  const f=document.getElementById("filters");
  const groups=[["Type","type",TYPES],["Format","mod",MODS],["Access","acc",ACCESS]];
  groups.forEach(([lab,key,vals],i)=>{
    if(i>0){const dv=document.createElement("div");dv.className="divider";f.appendChild(dv);}
    const g=document.createElement("div");g.className="grp";
    const gl=document.createElement("span");gl.className="grp-label";gl.textContent=lab;g.appendChild(gl);
    vals.forEach(v=>g.appendChild(chip(v,key,v)));
    f.appendChild(g);
  });
}
function match(e){
  if(state.type.size&&!state.type.has(e.type))return false;
  if(state.mod.size&&!state.mod.has(e.modality))return false;
  if(state.acc.size&&!state.acc.has(e.access))return false;
  if(state.q){const h=(e.title+" "+e.desc+" "+e.type+" "+e.note).toLowerCase();
    if(!h.includes(state.q.toLowerCase()))return false;}
  return true;
}
function render(){
  const list=document.getElementById("list");list.innerHTML="";
  const rows=EVENTS.filter(match).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  document.getElementById("count").textContent=rows.length+" event"+(rows.length!==1?"s":"");
  if(!rows.length){list.innerHTML='<div class="empty">Nothing matches those filters yet. Try clearing one.</div>';return;}
  let curMonth="";
  rows.forEach(e=>{
    const d=parseD(e.date);const mk=d.getFullYear()+"-"+d.getMonth();
    if(mk!==curMonth){curMonth=mk;
      const mh=document.createElement("div");mh.className="monthhead";
      mh.innerHTML=MONTHS[d.getMonth()]+'<span class="yr">'+d.getFullYear()+'</span>';list.appendChild(mh);}
    const card=document.createElement("div");card.className="event";card.tabIndex=0;
    card.setAttribute("role","button");card.setAttribute("aria-expanded","false");
    const accClass=e.access==="Public"?"acc-public":(e.access==="Free"?"acc-free":"");
    const regBtn=e.register?'<a class="reg" href="'+e.register+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Register &rarr;</a>':"";
    const noteHtml=e.note?'<div class="note">'+e.note+'</div>':"";
    card.innerHTML=
      '<div class="datecol"><div class="ddow">'+DOW[d.getDay()]+'</div><div class="dnum">'+d.getDate()+'</div></div>'+
      '<div class="body">'+
        '<p class="etitle">'+e.title+'</p>'+
        '<div class="meta">'+
          '<span class="ttime">'+e.time+(e.end?'&ndash;'+e.end:'')+'</span>'+
          '<span class="dot">&bull;</span>'+
          '<span class="tag">'+e.type+'</span>'+
          '<span class="tag mod">'+e.modality+'</span>'+
          (accClass?'<span class="tag '+accClass+'">'+e.access+'</span>':'')+
        '</div>'+
        '<div class="detail"><p>'+e.desc+'</p>'+noteHtml+regBtn+'</div>'+
      '</div>';
    const toggle=()=>{const o=card.classList.toggle("open");card.setAttribute("aria-expanded",o);};
    card.addEventListener("click",toggle);
    card.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();toggle();}});
    list.appendChild(card);
  });
}
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
document.getElementById("foot").innerHTML="Updated "+new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+"<br>Tap any event for details &amp; registration.";
buildFilters();render();
</script>
</body>
</html>
